name: Publish Shared Runtimes

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish-dotnet:
    name: Publish .NET Global Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Pack and Publish tiwater-xlsx
        run: |
          cd packages/xlsx-cli
          dotnet pack -c Release -o ./nupkg
          dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Pack and Publish tiwater-docx
        run: |
          cd packages/docx-cli
          dotnet pack -c Release -o ./nupkg
          dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  publish-python:
    name: Publish Python Runtime (tiwater-pdf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build and Publish tiwater-pdf
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          cd packages/pdf-cli
          python -m build
          twine upload dist/* --skip-existing
